<!DOCTYPE html>
<html>
<head>
  <title>Form Render</title>

  <style>
    body {
      background: #242424;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h1 {
      color: white;
      font-family: Georgia, serif;
      margin: 28px 0 42px 18px;
    }

    .box {
      background: white;
      width: 1230px;
      margin-left: 18px;
      padding: 48px 58px 45px 40px;
    }

    form {
      width: 1150px;
    }

    fieldset {
      border: 1px solid #aaa;
      border-radius: 6px;
      margin-bottom: 12px;
      padding: 14px 16px;
    }

    legend {
      font-size: 22px;
    }

    .row {
      margin-bottom: 10px;
    }

    label {
      display: inline-block;
      width: 220px;
      font-size: 22px;
      vertical-align: top;
    }

    input[type="text"],
    input[type="number"],
    input[type="email"] {
      width: 270px;
      height: 30px;
      font-size: 20px;
    }

    textarea {
      width: 890px;
      height: 135px;
      font-size: 20px;
    }

    select {
      width: 160px;
      height: 45px;
      font-size: 20px;
    }

    input[type="checkbox"],
    input[type="radio"] {
      width: 20px;
      height: 20px;
    }

    .inline {
      display: inline-block;
      font-size: 22px;
    }

    button {
      float: right;
      background: blue;
      color: white;
      font-size: 22px;
      padding: 10px 14px;
      border-radius: 7px;
      border: 2px solid #555;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <h1>Expected Form Render:</h1>

  <div class="box">
    <form action="https://teach-backend-fawn.vercel.app/api/product"
          method="POST"
          enctype="multipart/form-data">

      <fieldset>
        <legend>General Info</legend>

        <div class="row">
          <label>Item Name</label>
          <input type="text" name="itemName">
        </div>

        <div class="row">
          <label>Description</label>
          <textarea name="itemDescription"></textarea>
        </div>

        <div class="row">
          <label>Category</label>
          <select name="category">
            <option value="notSpecified">notSpecified</option>
            <option value="consumption">consumption</option>
            <option value="household">household</option>
            <option value="electronic">electronic</option>
            <option value="gadget">gadget</option>
          </select>
        </div>
      </fieldset>

      <fieldset>
        <legend>Misc.</legend>

        <div class="row">
          <label>Inventory Amount</label>
          <input type="number" name="inventoryAmount">
        </div>

        <div class="row">
          <label>List price</label>
          <input type="number" name="listPrice">
        </div>

        <div class="row">
          <label>Available Stores</label>
          <span class="inline">
            <input type="checkbox" name="availableStore[]" value="Bangkok">Bangkok
            <input type="checkbox" name="availableStore[]" value="Pattaya">Pattaya
            <input type="checkbox" name="availableStore[]" value="Phuket">Phuket
          </span>
        </div>

        <div class="row">
          <label>Available Stores</label>
          <span class="inline">
            <input type="radio" name="status" value="Active">Active
            <input type="radio" name="status" value="Inactive">Inactive
          </span>
        </div>
      </fieldset>

      <fieldset>
        <legend>Staff</legend>

        <div class="row">
          <label>Staff Email</label>
          <input type="email" name="staffEmail">
        </div>
      </fieldset>

      <button type="submit">Submit Form</button>

    </form>
  </div>

</body>
</html>
